<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة استيراد السيارات - الكابتن</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #60a5fa; 
            --accent: #3b82f6;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc; 
            --warning: rgba(245, 158, 11, 0.15);
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #020617 100%);
            background-attachment: fixed;
            color: var(--text); 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }

        /* تنبيه التحذير اللطيف */
        .warning-banner {
            background: var(--warning);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #fbbf24;
            padding: 12px 20px;
            border-radius: 15px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            max-width: 500px;
            text-align: center;
            line-height: 1.6;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .container { 
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            padding: 2.5rem; 
            border-radius: 2.5rem; 
            width: 100%; 
            max-width: 500px; 
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            position: relative;
        }

        h2 { 
            text-align: center; 
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem; 
            font-weight: 800;
        }

        .exchange-links {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 10px;
        }

        .exchange-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--primary);
            padding: 10px 15px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.8rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .exchange-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
        }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: #cbd5e1; }

        input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            background: rgba(255, 255, 255, 0.05); 
            color: white; 
            font-size: 1rem; 
            outline: none; 
            box-sizing: border-box; 
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.1); }

        input[readonly] { 
            background: rgba(255, 255, 255, 0.02); 
            color: #f59e0b; 
            border: 1px dashed rgba(245, 158, 11, 0.3); 
        }

        .results { 
            background: rgba(96, 165, 250, 0.05);
            padding: 1.5rem; 
            border-radius: 20px; 
            margin-top: 1.5rem; 
            border: 1px solid rgba(96, 165, 250, 0.2); 
        }

        .res-row { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 10px; 
            font-weight: 600; 
        }

        .val { color: #4ade80; font-size: 1.4rem; }

        .flex-row { display: flex; gap: 10px; }

        .developer-footer {
            margin-top: 2rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 500px;
        }

        .dev-name { font-size: 0.9rem; color: #94a3b8; margin-bottom: 10px; display: block; }
        .dev-name a { color: var(--primary); text-decoration: none; font-weight: bold; }

        .social-icons { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
        .social-icons a { color: rgba(255, 255, 255, 0.3); font-size: 1.5rem; transition: 0.3s; }
        .social-icons a:hover { color: var(--primary); transform: scale(1.2); }

        @media (max-width: 480px) { .flex-row { flex-direction: column; gap: 0; } }
    </style>
</head>
<body>

<div class="warning-banner">
    <i class="fas fa-exclamation-triangle"></i>
    <span>تنبيه: لا تعتمد يومياً على الحاسبة قبل مراجعة سعر الصرف من مصدر موثوق؛ هي فقط لتسهيل العملية الحسابية.</span>
</div>

<div class="container">
    <h2>حاسبة الكابتن 🚗</h2>

    <div class="exchange-links">
        <a href="https://www.google.com/search?q=usd+to+krw" target="_blank" class="exchange-btn">
            <i class="fas fa-globe-asia"></i> وون / دولار
        </a>
        <a href="https://www.google.com/search?q=%D8%B3%D8%B9%D8%B1+%D8%A7%D9%84%D8%AF%D9%88%D9%84%D8%A7%D8%B1" target="_blank" class="exchange-btn">
            <i class="fas fa-coins"></i> دولار / جنيه
        </a>
    </div>
    
    <div class="form-group">
        <label>سعر السيارة من الموقع (بالوون الكوري)</label>
        <input type="number" id="carPrice" placeholder="أدخل السعر..." oninput="calculate()">
    </div>

    <div class="flex-row">
        <div class="form-group" style="flex: 1;">
            <label>عمولة الموقع (وون)</label>
            <input type="text" value="500,000" readonly>
        </div>
        <div class="form-group" style="flex: 1;">
            <label>عمولة الشركة ($)</label>
            <input type="text" value="5,000" readonly>
        </div>
    </div>

    <div class="flex-row">
        <div class="form-group" style="flex: 1;">
            <label>سعر المبادرة ($)</label>
            <input type="number" id="initiative" value="8000" oninput="calculate()">
        </div>
        <div class="form-group" style="flex: 1;">
            <label>صرف الدولار (بالوون)</label>
            <input type="number" id="krwExchange" value="1477" oninput="calculate()">
        </div>
    </div>

    <div class="form-group">
        <label>سعر صرف الدولار (مقابل الجنيه المصري)</label>
        <input type="number" id="egpExchange" value="52.80" step="0.1" oninput="calculate()">
    </div>

    <div class="results">
        <div class="res-row">
            <span>الإجمالي بالدولار:</span>
            <span id="totalUSD" class="val">0 $</span>
        </div>
        <div class="res-row" style="margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">
            <span>الإجمالي بالمصري:</span>
            <span id="totalEGP" class="val" style="color: #60a5fa;">0 ج.م</span>
        </div>
    </div>
</div>

<div class="developer-footer">
    <span class="dev-name">Developed by 
        <a href="https://sukaryp.github.io/PROCODING/..." target="_blank">Belal Hesham</a>
    </span>
    <div class="social-icons">
        <a href="#"><i class="fab fa-facebook-f"></i></a>
        <a href="#"><i class="fab fa-whatsapp"></i></a>
        <a href="#"><i class="fab fa-github"></i></a>
    </div>
</div>

<script>
    function calculate() {
        const carPrice = parseFloat(document.getElementById('carPrice').value) || 0;
        const initiative = parseFloat(document.getElementById('initiative').value) || 0;
        const krwExchange = parseFloat(document.getElementById('krwExchange').value) || 1;
        const egpExchange = parseFloat(document.getElementById('egpExchange').value) || 0;

        const SITE_COMMISSION_KRW = 500000;
        const COMPANY_COMMISSION_USD = 5500;

        if (carPrice > 0) {
            const totalKRW = carPrice + SITE_COMMISSION_KRW;
            const priceInUSD = totalKRW / krwExchange;
            const finalUSD = priceInUSD + COMPANY_COMMISSION_USD + initiative;
            const finalEGP = finalUSD * egpExchange;

            document.getElementById('totalUSD').innerText = finalUSD.toLocaleString('en-US', {maximumFractionDigits: 2, minimumFractionDigits: 2}) + " $";
            document.getElementById('totalEGP').innerText = Math.round(finalEGP).toLocaleString('ar-EG') + " ج.م";
        } else {
            document.getElementById('totalUSD').innerText = "0 $";
            document.getElementById('totalEGP').innerText = "0 ج.م";
        }
    }
</script>

</body>
</html>
